<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','ui-monospace','monospace'] },
                colors: { faiston: {
                    bg:'#F4F5FA', dark:'#0B0D1F', border:'#E5E8F0', muted:'#5E647A', faint:'#9097AC',
                    cyan:'#06D7E6', purple:'#5B2EE0', magenta:'#B826C9', pink:'#EC4899', chart_pink:'#EC4899'
                } }
            }}
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-faiston-bg font-sans min-h-screen">

<header class="bg-white border-b border-faiston-border px-6 py-3 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
        <a href="/dashboard" class="flex items-center gap-2 text-sm text-slate-500 hover:text-faiston-dark transition-colors">
            <i class="ph ph-arrow-left"></i> Dashboard
        </a>
        <span class="w-px h-4 bg-slate-200"></span>
        <i class="ph ph-buildings text-faiston-purple"></i>
        <span class="text-sm font-bold text-faiston-dark">Clientes</span>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="openModal()" class="btn-grad text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
            <i class="ph ph-plus-circle"></i> Novo Cliente
        </button>
        <button onclick="logout()" class="text-faiston-faint hover:text-faiston-pink transition-colors"><i class="ph ph-sign-out text-lg"></i></button>
    </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">

    <!-- BUSCA -->
    <div class="flex items-center gap-3 mb-6">
        <div class="relative flex-1 max-w-sm">
            <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
            <input type="text" id="busca" placeholder="Buscar cliente..." oninput="filtrar()"
                class="w-full pl-9 pr-4 py-2 border border-faiston-border rounded-lg text-sm focus:outline-none focus:border-faiston-cyan transition-all bg-white">
        </div>
        <span class="text-xs text-faiston-faint" id="count-label">carregando...</span>
    </div>

    <!-- GRID DE CLIENTES -->
    <div id="clientes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- EMPTY -->
    <div id="empty" class="hidden flex flex-col items-center justify-center py-16 text-center">
        <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mb-4">
            <i class="ph ph-buildings text-3xl text-faiston-faint"></i>
        </div>
        <p class="font-semibold text-slate-600 mb-1">Nenhum cliente encontrado</p>
        <p class="text-sm text-faiston-faint">Clique em "Novo Cliente" para cadastrar</p>
    </div>
</main>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" style="backdrop-filter:blur(4px)">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div class="flex items-center justify-between p-6 border-b border-faiston-border">
            <h2 id="modal-title" class="text-lg font-bold text-faiston-dark">Novo Cliente</h2>
            <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center"><i class="ph ph-x text-faiston-muted"></i></button>
        </div>
        <div class="p-6 flex flex-col gap-4">
            <input type="hidden" id="edit-id">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Nome do Cliente *</label>
                <input type="text" id="c-nome" placeholder="Ex: NTT, Arcos Dourados..." class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Contato</label>
                <input type="text" id="c-contato" placeholder="Nome do responsável..." class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Email</label>
                <input type="email" id="c-email" placeholder="email@empresa.com" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all">
            </div>
            <div id="wrap-ativo" class="hidden items-center justify-between p-3 bg-slate-50 rounded-lg">
                <span class="text-sm font-medium text-slate-700">Cliente ativo</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="c-ativo" class="sr-only peer" checked>
                    <div class="w-10 h-5 bg-slate-200 rounded-full peer peer-checked:bg-faiston-purple peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                </label>
            </div>
        </div>
        <div class="flex gap-3 p-6 pt-0">
            <button onclick="closeModal()" class="flex-1 border border-faiston-border rounded-lg py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
            <button onclick="salvar()" class="flex-1 btn-grad text-white rounded-lg py-2.5 text-sm font-semibold">Salvar</button>
        </div>
    </div>
</div>

<script>
let clientes = [];
const cores = [
    'grad-bg-cool',
    'grad-bg',
    'from-faiston-magenta to-faiston-pink',
    'from-faiston-pink to-faiston-purple',
    'from-faiston-purple to-faiston-cyan',
    'from-faiston-cyan to-faiston-magenta'
];

async function init() {
    try {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const me = await res.json();
        if (me.perfil === 'funcionario') { window.location.href = '/funcionario'; return; }
    } catch(e) { window.location.href = '/'; return; }
    await carregar();
}

async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
}

async function carregar() {
    const res = await fetch('/api/clientes');
    if (!res.ok) return;
    clientes = await res.json();
    render(clientes);
}

function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    render(q ? clientes.filter(c => c.nome.toLowerCase().includes(q) || (c.contato||'').toLowerCase().includes(q)) : clientes);
}

function render(lista) {
    const grid = document.getElementById('clientes-grid');
    const empty = document.getElementById('empty');
    document.getElementById('count-label').textContent = `${lista.length} cliente${lista.length !== 1 ? 's' : ''}`;
    if (!lista.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); empty.classList.add('flex'); return; }
    empty.classList.add('hidden'); empty.classList.remove('flex');
    grid.innerHTML = lista.map((c, i) => `
        <div class="bg-white rounded-2xl border border-faiston-border overflow-hidden hover:-translate-y-1 hover:shadow-[0_4px_20px_rgba(91, 46, 224,0.1)] transition-all duration-300">
            <div class="h-1.5 bg-gradient-to-r ${cores[i % cores.length]}"></div>
            <div class="p-5">
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-tr ${cores[i % cores.length]} flex items-center justify-center text-white text-lg font-black">
                        ${c.nome.charAt(0)}
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="editar(${c.id})" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-faiston-purple transition-colors">
                            <i class="ph ph-pencil-simple text-sm"></i>
                        </button>
                        <button onclick="deletar(${c.id},'${c.nome}')" class="w-8 h-8 rounded-lg hover:bg-faiston-pink/10 flex items-center justify-center text-slate-300 hover:text-faiston-pink transition-colors">
                            <i class="ph ph-trash text-sm"></i>
                        </button>
                    </div>
                </div>
                <h3 class="font-bold text-faiston-dark text-base mb-1">${c.nome}</h3>
                ${c.contato ? `<p class="text-xs text-slate-500 flex items-center gap-1.5 mb-1"><i class="ph ph-user text-faiston-faint"></i>${c.contato}</p>` : ''}
                ${c.email ? `<p class="text-xs text-slate-500 flex items-center gap-1.5"><i class="ph ph-envelope text-faiston-faint"></i>${c.email}</p>` : ''}
                <div class="mt-3 pt-3 border-t border-faiston-border flex items-center justify-between">
                    <span class="text-[10px] text-faiston-faint">Desde ${c.criado_em}</span>
                    <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${c.ativo ? 'bg-faiston-cyan/10 text-faiston-cyan border border-faiston-cyan/30' : 'bg-slate-100 text-faiston-faint border border-faiston-border'}">${c.ativo ? 'Ativo' : 'Inativo'}</span>
                </div>
            </div>
        </div>`).join('');
}

function openModal() {
    document.getElementById('modal-title').textContent = 'Novo Cliente';
    document.getElementById('edit-id').value = '';
    document.getElementById('c-nome').value = '';
    document.getElementById('c-contato').value = '';
    document.getElementById('c-email').value = '';
    document.getElementById('c-ativo').checked = true;
    document.getElementById('wrap-ativo').classList.add('hidden');
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('c-nome').focus(), 100);
}

function editar(id) {
    const c = clientes.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modal-title').textContent = 'Editar Cliente';
    document.getElementById('edit-id').value = id;
    document.getElementById('c-nome').value = c.nome;
    document.getElementById('c-contato').value = c.contato || '';
    document.getElementById('c-email').value = c.email || '';
    document.getElementById('c-ativo').checked = c.ativo;
    document.getElementById('wrap-ativo').classList.remove('hidden');
    document.getElementById('wrap-ativo').classList.add('flex');
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function salvar() {
    const nome = document.getElementById('c-nome').value.trim();
    if (!nome) { alert('Informe o nome do cliente.'); return; }
    const id = document.getElementById('edit-id').value;
    const body = { nome, contato: document.getElementById('c-contato').value, email: document.getElementById('c-email').value, ativo: document.getElementById('c-ativo').checked };
    const res = id
        ? await fetch(`/api/clientes/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) })
        : await fetch('/api/clientes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { alert(data.detail || 'Erro ao salvar'); return; }
    closeModal(); carregar();
}

async function deletar(id, nome) {
    if (!confirm(`Desativar o cliente "${nome}"?`)) return;
    await fetch(`/api/clientes/${id}`, { method: 'DELETE' });
    carregar();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
</body>
</html>
