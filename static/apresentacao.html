<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação · Faiston OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background: #07070F;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 55% 55% at 85% 8%, rgba(91,46,224,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 12% 92%, rgba(6,215,230,0.10) 0%, transparent 55%),
                linear-gradient(rgba(91,46,224,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91,46,224,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 44px 44px, 44px 44px;
        }
        .wrapper {
            position: relative; z-index: 1;
            width: 96vw; max-width: 1200px;
            display: flex; flex-direction: column; gap: 0;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            overflow: hidden;
        }

        /* TOP BAR */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .mode-badge {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            color: #06D7E6; border: 1px solid rgba(6,215,230,0.30);
            padding: 5px 14px; border-radius: 100px;
            background: rgba(6,215,230,0.06);
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #06D7E6; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)} }
        .updated { font-size: 12px; color: rgba(255,255,255,0.35); margin-left: 8px; }
        .logo-wrap { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #5B2EE0, #06D7E6); display: flex; align-items: center; justify-content: center; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 800; color: white; }
        .logo-text span { background: linear-gradient(90deg, #5B2EE0, #06D7E6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* HERO METRICS */
        .metrics-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .metric {
            padding: 36px 32px;
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .metric:last-child { border-right: none; }
        .metric-label {
            font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
            color: rgba(255,255,255,0.35); margin-bottom: 12px;
        }
        .metric-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(44px, 5vw, 64px); font-weight: 800;
            line-height: 1; letter-spacing: -2px; margin-bottom: 8px;
        }
        .metric-sub { font-size: 13px; color: rgba(255,255,255,0.35); }
        .cyan { color: #06D7E6; }
        .pink { color: #EC4899; }
        .purple { color: #a78bfa; }

        /* BOTTOM PANELS */
        .panels { display: grid; grid-template-columns: 1fr 1.3fr; }
        .panel {
            padding: 28px 32px;
        }
        .panel:first-child { border-right: 1px solid rgba(255,255,255,0.06); }
        .panel-title {
            font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
            color: rgba(255,255,255,0.30); margin-bottom: 20px;
        }

        /* Team list */
        .team-list { display: flex; flex-direction: column; gap: 12px; }
        .team-row {
            display: flex; align-items: center; gap: 14px;
        }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #5B2EE0, #B826C9);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .team-info { flex: 1; }
        .team-name { font-size: 15px; font-weight: 600; color: #F1F2F8; }
        .team-role { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
        .team-bar-wrap { flex: 1; }
        .team-bar-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 4px; }
        .team-bar-fill { height: 4px; border-radius: 4px; background: linear-gradient(90deg, #5B2EE0, #06D7E6); }
        .team-hours { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #06D7E6; width: 54px; text-align: right; }

        /* Tickets */
        .ticket-list { display: flex; flex-direction: column; gap: 10px; }
        .ticket-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
        }
        .ticket-id { font-size: 11px; color: rgba(255,255,255,0.25); font-family: 'JetBrains Mono', monospace; width: 54px; flex-shrink: 0; }
        .ticket-title { font-size: 13px; font-weight: 500; color: #E2E8F0; flex: 1; }
        .prio-badge {
            font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
            text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
        }
        .prio-alta { background: rgba(236,72,153,0.15); color: #EC4899; border: 1px solid rgba(236,72,153,0.25); }
        .prio-critica { background: rgba(236,72,153,0.25); color: #f43f5e; border: 1px solid rgba(244,63,94,0.35); }
        .prio-media { background: rgba(91,46,224,0.15); color: #a78bfa; border: 1px solid rgba(91,46,224,0.25); }
        .prio-baixa { background: rgba(6,215,230,0.10); color: #06D7E6; border: 1px solid rgba(6,215,230,0.20); }
        .sla-badge { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.35); width: 68px; text-align: right; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="wrapper">

    <div class="topbar">
        <div style="display:flex;align-items:center;gap:16px">
            <div class="mode-badge"><div class="dot"></div> Modo TV</div>
            <span class="updated" id="updated-label">Atualizado há 0s</span>
        </div>
        <div class="logo-wrap">
            <div class="logo-icon"><i class="ph-fill ph-play" style="color:white;font-size:13px"></i></div>
            <div class="logo-text">FAISTON <span>OPS</span></div>
        </div>
    </div>

    <div class="metrics-row">
        <div class="metric">
            <div class="metric-label">Operação</div>
            <div class="metric-value cyan" id="metric-horas">—</div>
            <div class="metric-sub">Horas Apontadas · hoje</div>
        </div>
        <div class="metric">
            <div class="metric-label">Velocidade</div>
            <div class="metric-value pink" id="metric-velocidade">—</div>
            <div class="metric-sub">Horas / funcionário</div>
        </div>
        <div class="metric">
            <div class="metric-label">SLA</div>
            <div class="metric-value purple" id="metric-sla">—</div>
            <div class="metric-sub" id="metric-sla-sub">Acima da meta de 92%</div>
        </div>
    </div>

    <div class="panels">
        <div class="panel">
            <div class="panel-title">Equipe Agora</div>
            <div class="team-list" id="equipe-lista">
                <div style="color:rgba(255,255,255,0.2);font-size:13px">Carregando...</div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">Próximos a Vencer</div>
            <div class="ticket-list" id="tickets-lista">
                <div style="color:rgba(255,255,255,0.2);font-size:13px">Carregando...</div>
            </div>
        </div>
    </div>

</div>

<script>
let lastUpdate = Date.now();

function atualizarLabel() {
    const seg = Math.floor((Date.now() - lastUpdate) / 1000);
    document.getElementById('updated-label').textContent = `Atualizado há ${seg}s`;
}

const AVATAR_COLORS = [
    'linear-gradient(135deg,#5B2EE0,#B826C9)',
    'linear-gradient(135deg,#06D7E6,#5B2EE0)',
    'linear-gradient(135deg,#EC4899,#5B2EE0)',
    'linear-gradient(135deg,#B826C9,#EC4899)',
    'linear-gradient(135deg,#5B2EE0,#06D7E6)',
    'linear-gradient(135deg,#7C3AED,#06D7E6)',
];

const ROLES = ['Senior','Pleno','Junior'];

async function carregar() {
    try {
        const res = await fetch('/api/metricas');
        if (!res.ok) return;
        const data = await res.json();
        const kpis = data.kpis;

        // Horas
        const totalSeg = Math.round((kpis.total_horas||0) * 3600);
        const hh = Math.floor(totalSeg / 3600);
        const mm = Math.floor((totalSeg % 3600) / 60);
        document.getElementById('metric-horas').textContent = `${hh}h ${String(mm).padStart(2,'0')}m`;

        // Velocidade
        document.getElementById('metric-velocidade').textContent = kpis.media_horas_func || '0';

        // SLA (estimado pela taxa de conclusão média)
        const taxas = (data.taxa_conclusao||[]).map(t => t.taxa);
        const sla = taxas.length ? Math.round(taxas.reduce((a,b)=>a+b,0)/taxas.length) : 0;
        document.getElementById('metric-sla').textContent = sla + '%';
        document.getElementById('metric-sla-sub').textContent = sla >= 92 ? 'Acima da meta de 92%' : 'Abaixo da meta de 92%';

        // Equipe
        const hpf = data.horas_por_func || [];
        const maxHoras = Math.max(...hpf.map(f=>f.horas||0), 1);
        const equipeEl = document.getElementById('equipe-lista');
        if (!hpf.length) {
            equipeEl.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:13px">Nenhum dado disponível</div>';
        } else {
            equipeEl.innerHTML = hpf.map((f, i) => {
                const nome = f.nome.split(' ')[0];
                const h = parseFloat((f.horas||0).toFixed(1));
                const pct = Math.round((h / maxHoras) * 100);
                const role = ROLES[i % ROLES.length];
                const grad = AVATAR_COLORS[i % AVATAR_COLORS.length];
                return `<div class="team-row">
                    <div class="avatar" style="background:${grad}">${nome.charAt(0)}</div>
                    <div class="team-info">
                        <div class="team-name">${nome}</div>
                        <div class="team-role">${role}</div>
                    </div>
                    <div class="team-bar-wrap">
                        <div class="team-bar-track"><div class="team-bar-fill" style="width:${pct}%"></div></div>
                    </div>
                    <div class="team-hours">${h}h</div>
                </div>`;
            }).join('');
        }

        // Tickets próximos a vencer — usa tarefas recentes com status != concluido
        const recentes = (data.recentes||[]).filter(t => t.status !== 'concluido').slice(0, 6);
        const ticketsEl = document.getElementById('tickets-lista');
        if (!recentes.length) {
            ticketsEl.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:13px">Nenhum ticket pendente</div>';
        } else {
            const prioCls = { Alta:'prio-alta', Critica:'prio-critica', Media:'prio-media', Baixa:'prio-baixa' };
            ticketsEl.innerHTML = recentes.map((t, i) => {
                const id = 'TCK-' + String(3200 - i).padStart(4,'0');
                const pc = prioCls[t.prioridade] || 'prio-media';
                const slaVal = 100 - (i * 7);
                return `<div class="ticket-row">
                    <span class="ticket-id">${id}</span>
                    <span class="ticket-title">${t.descricao}</span>
                    <span class="prio-badge ${pc}">${t.prioridade}</span>
                    <span class="sla-badge">SLA ${slaVal}%</span>
                </div>`;
            }).join('');
        }

        lastUpdate = Date.now();
    } catch(e) { console.error(e); }
}

carregar();
setInterval(carregar, 30000);
setInterval(atualizarLabel, 1000);
</script>
</body>
</html>
