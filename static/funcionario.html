}

async function carregarNotas() {
    const res=await fetch('/api/notas'); if(!res.ok) return;
    notas=await res.json(); renderListaNotas();
    const label=document.getElementById('notas-count-label');
    if (label) label.textContent=notas.length>0?`${notas.length} nota${notas.length>1?'s':''}`:'Nenhuma nota';
    if (notas.length>0&&!notaAtualId) selecionarNota(notas[0].id); else if(!notas.length) mostrarVazioSidebar();
}

function renderListaNotas() {
    const lista=document.getElementById('notas-sidebar-lista');
    document.getElementById('notas-sidebar-empty').classList.toggle('hidden',notas.length>0);
    if (!notas.length) { lista.innerHTML=''; return; }
    lista.innerHTML=notas.map(n=>`
        <div class="flex items-center border-b border-faiston-border hover:bg-slate-50 transition-colors ${notaAtualId===n.id?'bg-faiston-purple/10 border-l-2 border-l-faiston-purple':''}">
            <div onclick="selecionarNota(${n.id})" class="cursor-pointer flex-1 min-w-0 px-4 py-3">
                <p class="text-xs font-bold text-faiston-dark truncate">${n.titulo||'Sem título'}</p>
                <p class="text-[10px] text-slate-400 mt-0.5 truncate">${(n.texto||'').substring(0,50)}${(n.texto||'').length>50?'...':''}</p>
            </div>
            <button onclick="abrirModalNota(${n.id})" title="Expandir" class="flex-shrink-0 w-8 h-8 mr-2 rounded-lg hover:bg-faiston-purple/10 flex items-center justify-center text-slate-300 hover:text-faiston-purple transition-colors">
                <i class="ph ph-arrows-out text-xs"></i>
            </button>
        </div>`).join('');
}

function selecionarNota(id) {
    if (alterado&&notaAtualId) salvarNotaAtual();
    notaAtualId=id;
    const nota=notas.find(n=>n.id===id); if(!nota) return;
    document.getElementById('notas-sidebar-empty').classList.add('hidden');
    document.getElementById('notas-sidebar-editor').classList.remove('hidden');
    document.getElementById('nota-titulo-s').value=nota.titulo;
    document.getElementById('nota-texto-s').value=nota.texto||'';
    document.getElementById('nota-status-s').textContent='Salvo';
    document.getElementById('nota-chars-s').textContent=`${(nota.texto||'').length} car.`;
    alterado=false; renderListaNotas();
}

function mostrarVazioSidebar() {
    document.getElementById('notas-sidebar-empty').classList.remove('hidden');
    document.getElementById('notas-sidebar-editor').classList.add('hidden');
}

function marcarAlterado() {
    alterado=true;
    document.getElementById('nota-status-s').textContent='Não salvo...';
    document.getElementById('nota-chars-s').textContent=`${document.getElementById('nota-texto-s').value.length} car.`;
    clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(()=>salvarNotaAtual(),2000);
}

async function salvarNotaAtual() {
    if (!notaAtualId&&!alterado) return;
    const titulo=document.getElementById('nota-titulo-s').value.trim()||'Sem título';
    const texto=document.getElementById('nota-texto-s').value;
    clearTimeout(autoSaveTimer);
    try {
        if (notaAtualId==='nova') {
            const res=await fetch('/api/notas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo,texto})});
            notaAtualId=(await res.json()).id;
        } else {
            await fetch(`/api/notas/${notaAtualId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo,texto})});
        }
        alterado=false;
        document.getElementById('nota-status-s').textContent='Salvo ✓';
        await carregarNotas();
    } catch(e) {}
}

async function novaNota() {
    if (alterado) await salvarNotaAtual();
    notaAtualId='nova';
    document.getElementById('notas-sidebar-empty').classList.add('hidden');
    document.getElementById('notas-sidebar-editor').classList.remove('hidden');
    document.getElementById('nota-titulo-s').value='';
    document.getElementById('nota-texto-s').value='';
    document.getElementById('nota-status-s').textContent='Nova nota';
    document.getElementById('nota-chars-s').textContent='0 car.';
    alterado=false;
    setTimeout(()=>document.getElementById('nota-titulo-s').focus(),50);
}

async function deletarNotaAtual() {
    if (!notaAtualId||notaAtualId==='nova') { mostrarVazioSidebar(); return; }
    if (!confirm('Deletar esta nota?')) return;
    await fetch(`/api/notas/${notaAtualId}`,{method:'DELETE'});
    notaAtualId=null; alterado=false;
    await carregarNotas();
    if (notas.length>0) selecionarNota(notas[0].id); else mostrarVazioSidebar();
}

// ── CARIMBOS ─────────────────────────────────────────────────────────
let carimbos=[], modalCarimboId=null;

async function carregarCarimbos() {
    const res=await fetch('/api/carimbos'); if(!res.ok) return;
    carimbos=await res.json();
}

function abrirModalCarimbo(id) {
    modalCarimboId=id;
    const c=id ? carimbos.find(x=>x.id===id) : null;
    document.getElementById('modal-carimbo-titulo-header').textContent = c ? 'Editar Carimbo' : 'Novo Carimbo';
    document.getElementById('mc-titulo').value = c ? c.titulo : '';
    document.getElementById('mc-categoria').value = c ? c.categoria : '';
    document.getElementById('mc-conteudo').value = c ? c.conteudo : '';
    document.getElementById('mc-btn-deletar').classList.toggle('hidden', !c);
    document.getElementById('modal-carimbo-func').classList.remove('hidden');
}

function fecharModalCarimbo() {
    document.getElementById('modal-carimbo-func').classList.add('hidden');
    modalCarimboId=null;
}

async function salvarCarimboModal() {
    const titulo=document.getElementById('mc-titulo').value.trim();
    const categoria=document.getElementById('mc-categoria').value.trim()||'Geral';
    const conteudo=document.getElementById('mc-conteudo').value;
    if (!titulo) { alert('Informe o título do carimbo.'); return; }
    const btn=document.getElementById('mc-btn-salvar');
    btn.disabled=true; btn.textContent='Salvando...';
    try {
        const url = modalCarimboId ? `/api/carimbos/${modalCarimboId}` : '/api/carimbos';
        const method = modalCarimboId ? 'PUT' : 'POST';
        const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo,categoria,conteudo})});
        const data=await res.json();
        if (!res.ok) { alert(data.detail||'Erro ao salvar'); return; }
        fecharModalCarimbo();
        await carregarCarimbos();
        renderCarimbos();
    } catch(e){ alert('Erro de conexão'); }
    finally { btn.disabled=false; btn.textContent='Salvar'; }
}

async function deletarCarimboModal() {
    if (!modalCarimboId || !confirm('Excluir este carimbo?')) return;
    const res=await fetch(`/api/carimbos/${modalCarimboId}`,{method:'DELETE'});
    if (!res.ok) { const d=await res.json(); alert(d.detail||'Erro'); return; }
    fecharModalCarimbo();
    await carregarCarimbos();
    renderCarimbos();
}

const CAT_COLORS_LIGHT = [
    {border:'#5B2EE0', bg:'#f5f0ff', badge:'#ede5ff', text:'#5B2EE0'},
    {border:'#06D7E6', bg:'#f0fffe', badge:'#d6feff', text:'#0a9ba6'},
    {border:'#f59e0b', bg:'#fffbf0', badge:'#fef3c7', text:'#b45309'},
    {border:'#10b981', bg:'#f0fdf8', badge:'#d1fae5', text:'#047857'},
    {border:'#ef4444', bg:'#fff5f5', badge:'#fee2e2', text:'#b91c1c'},
    {border:'#8b5cf6', bg:'#f8f5ff', badge:'#ede9fe', text:'#6d28d9'},
    {border:'#f97316', bg:'#fff7f0', badge:'#ffedd5', text:'#c2410c'},
    {border:'#3b82f6', bg:'#f0f6ff', badge:'#dbeafe', text:'#1d4ed8'},
];
const CAT_COLORS_DARK = [
    {border:'#7C52F0', bg:'rgba(91,46,224,0.12)', badge:'rgba(91,46,224,0.2)', text:'#A584F5'},
    {border:'#06D7E6', bg:'rgba(6,215,230,0.08)', badge:'rgba(6,215,230,0.15)', text:'#06D7E6'},
    {border:'#f59e0b', bg:'rgba(245,158,11,0.08)', badge:'rgba(245,158,11,0.15)', text:'#FCD34D'},
    {border:'#10b981', bg:'rgba(16,185,129,0.08)', badge:'rgba(16,185,129,0.15)', text:'#34D399'},
    {border:'#ef4444', bg:'rgba(239,68,68,0.08)', badge:'rgba(239,68,68,0.15)', text:'#FCA5A5'},
    {border:'#8b5cf6', bg:'rgba(139,92,246,0.08)', badge:'rgba(139,92,246,0.15)', text:'#C4B5FD'},
    {border:'#f97316', bg:'rgba(249,115,22,0.08)', badge:'rgba(249,115,22,0.15)', text:'#FDBA74'},
    {border:'#3b82f6', bg:'rgba(59,130,246,0.08)', badge:'rgba(59,130,246,0.15)', text:'#93C5FD'},
];
function catColor(idx){
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const pal = dark ? CAT_COLORS_DARK : CAT_COLORS_LIGHT;
    return pal[idx % pal.length];
}

function renderCarimbos() {
    const cont=document.getElementById('carimbos-view-content'); if(!cont) return;
    if (!carimbos.length) {
        cont.innerHTML=`<div class="text-center py-24 text-slate-300"><i class="ph ph-stamp text-3xl mb-3 block"></i><p class="text-sm">Nenhum carimbo ainda.<br>Clique em "Novo Carimbo" para criar o primeiro.</p></div>`;
        return;
    }
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const cardBg    = dark ? '#11111E' : '#ffffff';
    const cardBord  = dark ? 'rgba(255,255,255,0.07)' : '#e8e8f0';
    const titleCol  = dark ? '#F1F2F8' : '#0B0D1F';
    const preCol    = dark ? '#8B93AE' : '#6b7280';
    const byCat={};
    carimbos.forEach(c=>{ if(!byCat[c.categoria||'Geral']) byCat[c.categoria||'Geral']=[]; byCat[c.categoria||'Geral'].push(c); });
    cont.innerHTML=Object.entries(byCat).map(([cat,items],idx)=>{
        const col=catColor(idx);
        return `
        <div class="mb-8">
            <div class="flex items-center gap-3 mb-4">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider" style="background:${col.badge};color:${col.text}">
                    <i class="ph ph-stamp text-xs"></i>${cat}
                </span>
                <span class="flex-1 h-px" style="background:${col.border};opacity:0.25"></span>
                <span class="text-[10px]" style="color:${preCol}">${items.length} carimbo${items.length>1?'s':''}</span>
            </div>
            <div class="grid grid-cols-3 gap-4">
                ${items.map(c=>`
                <div class="rounded-2xl p-4 hover:shadow-lg transition-all flex flex-col" style="background:${cardBg};border-left:4px solid ${col.border};border-top:1px solid ${cardBord};border-right:1px solid ${cardBord};border-bottom:1px solid ${cardBord};">
                    <div class="flex items-start justify-between mb-2 gap-2">
                        <p class="text-sm font-bold leading-tight" style="color:${titleCol}">${c.titulo}</p>
                        ${c.meu ? `<button onclick="abrirModalCarimbo(${c.id})" class="flex-shrink-0 transition-colors" style="color:${dark?'#4A5068':'#ccc'}" onmouseover="this.style.color='${col.border}'" onmouseout="this.style.color='${dark?'#4A5068':'#ccc'}'" title="Editar"><i class="ph ph-pencil text-sm"></i></button>` : ''}
                    </div>
                    <pre class="text-xs leading-relaxed mb-4 whitespace-pre-wrap font-sans flex-1" style="color:${preCol};min-height:60px;max-height:120px;overflow:hidden">${c.conteudo||''}</pre>
                    <button onclick="copiarCarimbo(${c.id},this)" class="w-full flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-semibold transition-all" style="border:1px solid ${col.border}40;color:${col.text};background:${col.bg}" onmouseover="this.style.background='${col.badge}'" onmouseout="this.style.background='${col.bg}'">
                        <i class="ph ph-copy text-sm"></i> Copiar
                    </button>
                </div>`).join('')}
            </div>
        </div>`;
    }).join('');
}

async function copiarCarimbo(id, btn) {
    const c=carimbos.find(x=>x.id===id); if(!c) return;
    await navigator.clipboard.writeText(c.conteudo||'');
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="ph ph-check text-sm"></i> Copiado!';
    btn.style.borderColor='#06D7E6'; btn.style.color='#06D7E6';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.borderColor=''; btn.style.color=''; },1800);
}

// ── MODAL NOTA EXPANDIDA ─────────────────────────────────────────────
let modalNotaId=null, modalAlterado=false;

function abrirModalNota(id) {
    const nota=notas.find(n=>n.id===id); if(!nota) return;
    modalNotaId=id; modalAlterado=false;
    document.getElementById('modal-nota-titulo').value=nota.titulo||'';
    document.getElementById('modal-nota-texto').value=nota.texto||'';
    document.getElementById('modal-nota-status').textContent='Salvo';
    document.getElementById('modal-nota-chars').textContent=`${(nota.texto||'').length} caracteres`;
    document.getElementById('modal-ia-section').classList.add('hidden');
    document.getElementById('modal-ia-resultado').textContent='';
    document.getElementById('modal-nota-expand').classList.remove('hidden');
    document.body.style.overflow='hidden';
}

function fecharModalNota() {
    if (modalAlterado) salvarModalNota();
    document.getElementById('modal-nota-expand').classList.add('hidden');
    document.body.style.overflow='';
}

function modalMarcarAlterado() {
    modalAlterado=true;
    document.getElementById('modal-nota-status').textContent='Não salvo...';
    document.getElementById('modal-nota-chars').textContent=`${document.getElementById('modal-nota-texto').value.length} caracteres`;
}

async function salvarModalNota() {
    if (!modalNotaId) return;
    const titulo=document.getElementById('modal-nota-titulo').value.trim()||'Sem título';
    const texto=document.getElementById('modal-nota-texto').value;
    await fetch(`/api/notas/${modalNotaId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo,texto})});
    modalAlterado=false;
    document.getElementById('modal-nota-status').textContent='Salvo ✓';
    const nota=notas.find(n=>n.id===modalNotaId);
    if (nota) { nota.titulo=titulo; nota.texto=texto; }
    await carregarNotas();
}

async function analisarNota() {
    if (!modalNotaId) return;
    if (modalAlterado) await salvarModalNota();
    const section=document.getElementById('modal-ia-section');
    const loading=document.getElementById('modal-ia-loading');
    const resultado=document.getElementById('modal-ia-resultado');
    const btn=document.getElementById('btn-analisar-ia');
    section.classList.remove('hidden');
    loading.style.display='flex'; resultado.textContent='';
    btn.disabled=true; btn.style.opacity='0.6';
    try {
        const res=await fetch(`/api/notas/${modalNotaId}/analise`,{method:'POST'});
        if (!res.ok) throw new Error(await res.text());
        const data=await res.json();
        loading.style.display='none';
        resultado.textContent=data.analise||'Sem análise disponível.';
    } catch(e) {
        loading.style.display='none';
        resultado.textContent='Erro ao analisar. Verifique sua conexão e tente novamente.';
    } finally {
        btn.disabled=false; btn.style.opacity='1';
    }
}

function fecharAnalise() {
    document.getElementById('modal-ia-section').classList.add('hidden');
}

async function deletarNotaModal() {
    if (!modalNotaId) return;
    if (!confirm('Deletar esta nota?')) return;
    await fetch(`/api/notas/${modalNotaId}`,{method:'DELETE'});
    fecharModalNota();
    modalNotaId=null;
    await carregarNotas();
    if (notas.length>0) selecionarNota(notas[0].id); else mostrarVazioSidebar();
}

// ── TEMA ─────────────────────────────────────────────────────────────
function toggleTemaFunc() {
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const novo=!isDark;
    localStorage.setItem('faiston_tema',novo?'dark':'light');
    document.documentElement.setAttribute('data-theme',novo?'dark':'light');
    const icon=document.getElementById('icon-tema-f');
    if (icon) icon.className=novo?'ph ph-sun text-faiston-cyan':'ph ph-moon';
    // Re-renderiza carimbos: os cards usam inline styles calculados na hora do
    // render, então precisam ser recriados quando o tema muda
    if (tabAtiva==='carimbos') renderCarimbos();
    if (tabAtiva==='kanban') renderTasks();
    if (tabAtiva==='agenda') renderAgenda();
}
(function(){ const icon=document.getElementById('icon-tema-f'); if(icon&&localStorage.getItem('faiston_tema')==='dark') icon.className='ph ph-sun text-faiston-cyan'; })();
