<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faiston Ops - Painel do Funcionário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] },
                colors: { faiston: { bg:'#F8FAFC', dark:'#0A0A1A', border:'#E2E8F0', cyan:'#00E5FF', purple:'#4A00E0', magenta:'#FF007F' } } } }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .timer-running { animation: pulse-border 1.5s ease-in-out infinite; }
        @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.4)}50%{box-shadow:0 0 0 6px rgba(0,229,255,0)} }
        .custom-scrollbar::-webkit-scrollbar{width:5px}.custom-scrollbar::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
        .task-card{transition:all 0.2s ease}.task-card:hover{transform:translateY(-2px)}
        .priority-Alta{border-left:3px solid #FF007F}.priority-Media{border-left:3px solid #F59E0B}.priority-Baixa{border-left:3px solid #10B981}
        .timer-display{font-variant-numeric:tabular-nums;letter-spacing:0.05em}
    </style>
</head>
<body class="bg-faiston-bg text-slate-800 font-sans min-h-screen">

<header class="bg-white border-b border-faiston-border px-6 py-3 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
        <i class="ph-fill ph-play text-2xl text-transparent bg-clip-text bg-gradient-to-tr from-faiston-cyan via-faiston-purple to-faiston-magenta"></i>
        <span class="font-black text-faiston-dark tracking-tight">FAISTON <span class="text-transparent bg-clip-text bg-gradient-to-r from-faiston-purple to-faiston-cyan">OPS</span></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span class="text-sm text-slate-500 font-medium">Minhas Tarefas</span>
    </div>
    <div class="flex items-center gap-3">
        <div id="global-timer" class="hidden items-center gap-2 bg-cyan-50 border border-cyan-200 rounded-lg px-3 py-1.5">
            <div class="w-2 h-2 rounded-full bg-faiston-cyan animate-pulse"></div>
            <span class="text-xs font-semibold text-cyan-700">Em andamento:</span>
            <span id="global-task-name" class="text-xs text-cyan-800 font-bold max-w-32 truncate"></span>
            <span id="global-timer-display" class="timer-display text-sm font-bold text-faiston-cyan">00:00:00</span>
        </div>
        <button onclick="openModal()" class="bg-gradient-to-r from-faiston-purple to-faiston-magenta text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-[0_0_12px_rgba(255,0,127,0.3)] hover:shadow-[0_0_18px_rgba(0,229,255,0.5)] transition-all flex items-center gap-2">
            <i class="ph ph-plus-circle text-lg"></i> Nova Tarefa
        </button>
        <button onclick="logout()" class="flex items-center gap-2 text-sm text-slate-500 hover:text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
            <i class="ph ph-sign-out"></i> Sair
        </button>
        <div class="flex items-center gap-2 pl-3 border-l border-faiston-border">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-faiston-purple to-faiston-cyan flex items-center justify-center text-white text-xs font-bold" id="user-avatar">?</div>
            <span class="text-sm font-semibold text-faiston-dark" id="user-nome">...</span>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-6">
    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 border border-faiston-border">
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-1">Tarefas</p>
            <p class="text-2xl font-bold text-faiston-dark" id="count-total">0</p>
        </div>
        <div class="bg-white rounded-xl p-4 border border-faiston-border">
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-1">Concluídas</p>
            <p class="text-2xl font-bold text-emerald-600" id="count-done">0</p>
        </div>
        <div class="bg-white rounded-xl p-4 border border-faiston-border">
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-1">Em Andamento</p>
            <p class="text-2xl font-bold text-faiston-cyan" id="count-progress">0</p>
        </div>
        <div class="bg-white rounded-xl p-4 border border-faiston-border">
            <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-1">Horas Apontadas</p>
            <p class="text-2xl font-bold text-faiston-purple" id="count-hours">0h 00m</p>
        </div>
    </div>

    <div class="flex items-center gap-3 mb-5">
        <span class="text-sm font-semibold text-slate-500">Filtrar:</span>
        <div class="flex gap-2">
            <button onclick="setFilter('todos')" data-filter="todos" class="filter-btn bg-faiston-dark text-white px-3 py-1.5 rounded-lg text-xs font-semibold border border-faiston-border transition-all">Todos</button>
            <button onclick="setFilter('aberto')" data-filter="aberto" class="filter-btn bg-white text-slate-600 px-3 py-1.5 rounded-lg text-xs font-semibold border border-faiston-border hover:bg-slate-50 transition-all">Aberto</button>
            <button onclick="setFilter('em_andamento')" data-filter="em_andamento" class="filter-btn bg-white text-slate-600 px-3 py-1.5 rounded-lg text-xs font-semibold border border-faiston-border hover:bg-slate-50 transition-all">Em Andamento</button>
            <button onclick="setFilter('concluido')" data-filter="concluido" class="filter-btn bg-white text-slate-600 px-3 py-1.5 rounded-lg text-xs font-semibold border border-faiston-border hover:bg-slate-50 transition-all">Concluído</button>
        </div>
        <div class="flex gap-2 ml-auto">
            <select id="filter-cliente" onchange="renderTasks()" class="text-xs border border-faiston-border rounded-lg px-3 py-1.5 bg-white text-slate-600 focus:outline-none focus:border-faiston-cyan">
                <option value="">Todos os clientes</option>
                <option>NTT</option><option>Arcos Dourados</option><option>Zamp</option><option>Telcoweb</option>
            </select>
            <select id="filter-prioridade" onchange="renderTasks()" class="text-xs border border-faiston-border rounded-lg px-3 py-1.5 bg-white text-slate-600 focus:outline-none focus:border-faiston-cyan">
                <option value="">Todas as prioridades</option>
                <option>Alta</option><option>Media</option><option>Baixa</option>
            </select>
        </div>
    </div>

    <div id="tasks-container" class="flex flex-col gap-3"></div>
    <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
        <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mb-4"><i class="ph ph-clipboard-text text-3xl text-slate-400"></i></div>
        <p class="font-semibold text-slate-600 mb-1">Nenhuma tarefa encontrada</p>
        <p class="text-sm text-slate-400">Clique em "Nova Tarefa" para começar</p>
    </div>
</main>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" style="backdrop-filter:blur(4px)">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
        <div class="flex items-center justify-between p-6 border-b border-faiston-border">
            <h2 id="modal-title" class="text-lg font-bold text-faiston-dark">Nova Tarefa</h2>
            <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center"><i class="ph ph-x text-slate-500"></i></button>
        </div>
        <div class="p-6 flex flex-col gap-4">
            <input type="hidden" id="edit-id">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Descrição *</label>
                <input type="text" id="input-descricao" placeholder="Descreva a tarefa..." class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan focus:ring-1 focus:ring-faiston-cyan transition-all">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Cliente *</label>
                    <select id="input-cliente" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all bg-white">
                        <option value="">Selecionar...</option>
                        <option>NTT</option><option>Arcos Dourados</option><option>Zamp</option><option>Telcoweb</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Prioridade</label>
                    <select id="input-prioridade" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all bg-white">
                        <option value="Media">Média</option><option value="Alta">Alta</option><option value="Baixa">Baixa</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Status</label>
                    <select id="input-status" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all bg-white">
                        <option value="aberto">Aberto</option>
                        <option value="em_andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Horas Manuais</label>
                    <div class="flex gap-2">
                        <input type="number" id="input-horas" placeholder="0" min="0" max="23" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all text-center">
                        <input type="number" id="input-minutos" placeholder="00" min="0" max="59" class="w-full border border-faiston-border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-faiston-cyan transition-all text-center">
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">horas / minutos</p>
                </div>
            </div>
        </div>
        <div class="flex gap-3 p-6 pt-0">
            <button onclick="closeModal()" class="flex-1 border border-faiston-border rounded-lg py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
            <button onclick="saveTask()" class="flex-1 bg-gradient-to-r from-faiston-purple to-faiston-magenta text-white rounded-lg py-2.5 text-sm font-semibold shadow-[0_0_12px_rgba(255,0,127,0.3)] hover:shadow-[0_0_18px_rgba(0,229,255,0.4)] transition-all">Salvar Tarefa</button>
        </div>
    </div>
</div>

<script>
let tasks = [];
let activeTaskId = null;
let timerInterval = null;
let timerSeconds = 0;
let timerStart = null;
let currentFilter = 'todos';

const clientColors = { 'NTT':'bg-blue-100 text-blue-700 border-blue-200','Arcos Dourados':'bg-yellow-100 text-yellow-700 border-yellow-200','Zamp':'bg-purple-100 text-purple-700 border-purple-200','Telcoweb':'bg-emerald-100 text-emerald-700 border-emerald-200' };
const priorityConfig = { 'Alta':{ badge:'bg-pink-100 text-pink-700 border-pink-200',icon:'ph-arrow-fat-up' },'Media':{ badge:'bg-amber-100 text-amber-700 border-amber-200',icon:'ph-equals' },'Baixa':{ badge:'bg-emerald-100 text-emerald-700 border-emerald-200',icon:'ph-arrow-fat-down' } };
const statusConfig = { 'aberto':{ label:'Aberto',badge:'bg-slate-100 text-slate-600 border-slate-200' },'em_andamento':{ label:'Em Andamento',badge:'bg-cyan-100 text-cyan-700 border-cyan-200' },'concluido':{ label:'Concluído',badge:'bg-emerald-100 text-emerald-700 border-emerald-200' } };

function fmt(s) { return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function fmtH(s) { return `${Math.floor(s/3600)}h ${String(Math.floor((s%3600)/60)).padStart(2,'0')}m`; }

async function init() {
    try {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const me = await res.json();
        if (me.perfil === 'admin') { window.location.href = '/admin'; return; }
        if (me.perfil === 'gestor') { window.location.href = '/dashboard'; return; }
        document.getElementById('user-nome').textContent = me.nome;
        document.getElementById('user-avatar').textContent = me.nome.charAt(0).toUpperCase();
    } catch(e) { window.location.href = '/'; return; }
    await carregarTarefas();
}

async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
}

async function carregarTarefas() {
    const res = await fetch('/api/tarefas');
    if (!res.ok) return;
    tasks = await res.json();
    renderTasks();
    updateSummary();
}

function startTimer(taskId) {
    if (activeTaskId && activeTaskId !== taskId) stopTimer(activeTaskId, true);
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    timerSeconds = task.segundos;
    timerStart = Date.now();
    activeTaskId = taskId;
    task._running = true;
    const gt = document.getElementById('global-timer');
    gt.classList.remove('hidden'); gt.classList.add('flex');
    document.getElementById('global-task-name').textContent = task.descricao;
    let saveCounter = 0;
    timerInterval = setInterval(() => {
        const elapsed = task.segundos + Math.floor((Date.now() - timerStart) / 1000);
        const el = document.getElementById(`timer-${taskId}`);
        if (el) el.textContent = fmt(elapsed);
        document.getElementById('global-timer-display').textContent = fmt(elapsed);
        // Salva no banco a cada 30 segundos automaticamente
        saveCounter++;
        if (saveCounter % 30 === 0) {
            const secsNow = task.segundos + Math.floor((Date.now() - timerStart) / 1000);
            fetch(`/api/tarefas/${taskId}/segundos`, {
                method: 'PATCH', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ segundos: secsNow })
            });
        }
    }, 1000);
    // Salva status em andamento
    fetch(`/api/tarefas/${taskId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ descricao: task.descricao, cliente: task.cliente, prioridade: task.prioridade, status: 'em_andamento', segundos: task.segundos })
    });
    task.status = 'em_andamento';
    renderTasks();
}

async function stopTimer(taskId, silent = false) {
    const task = tasks.find(t => t.id === taskId);
    if (!task || !task._running) return;
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    task.segundos += elapsed;
    task._running = false;
    activeTaskId = null;
    clearInterval(timerInterval); timerInterval = null; timerStart = null;
    document.getElementById('global-timer').classList.add('hidden');
    document.getElementById('global-timer').classList.remove('flex');
    await fetch(`/api/tarefas/${taskId}/segundos`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ segundos: task.segundos })
    });
    if (!silent) renderTasks();
}

function toggleTimer(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    if (task._running) stopTimer(taskId);
    else startTimer(taskId);
}

async function deleteTask(taskId) {
    if (activeTaskId === taskId) await stopTimer(taskId, true);
    await fetch(`/api/tarefas/${taskId}`, { method: 'DELETE' });
    tasks = tasks.filter(t => t.id !== taskId);
    renderTasks(); updateSummary();
}

function editTask(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    document.getElementById('modal-title').textContent = 'Editar Tarefa';
    document.getElementById('edit-id').value = taskId;
    document.getElementById('input-descricao').value = task.descricao;
    document.getElementById('input-cliente').value = task.cliente;
    document.getElementById('input-prioridade').value = task.prioridade;
    document.getElementById('input-status').value = task.status;
    document.getElementById('input-horas').value = Math.floor(task.segundos / 3600);
    document.getElementById('input-minutos').value = Math.floor((task.segundos % 3600) / 60);
    document.getElementById('modal').classList.remove('hidden');
}

function openModal() {
    document.getElementById('modal-title').textContent = 'Nova Tarefa';
    document.getElementById('edit-id').value = '';
    document.getElementById('input-descricao').value = '';
    document.getElementById('input-cliente').value = '';
    document.getElementById('input-prioridade').value = 'Media';
    document.getElementById('input-status').value = 'aberto';
    document.getElementById('input-horas').value = '';
    document.getElementById('input-minutos').value = '';
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('input-descricao').focus(), 100);
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function saveTask() {
    const descricao = document.getElementById('input-descricao').value.trim();
    const cliente = document.getElementById('input-cliente').value;
    if (!descricao || !cliente) { alert('Preencha a descrição e o cliente.'); return; }
    const horas = parseInt(document.getElementById('input-horas').value) || 0;
    const minutos = parseInt(document.getElementById('input-minutos').value) || 0;
    const segundos = (horas * 3600) + (minutos * 60);
    const editId = document.getElementById('edit-id').value;
    const body = {
        descricao, cliente,
        prioridade: document.getElementById('input-prioridade').value,
        status: editId ? document.getElementById('input-status').value : 'em_andamento',
        segundos
    };

    if (editId) {
        const task = tasks.find(t => t.id == editId);
        if (task && !task._running) {
            await fetch(`/api/tarefas/${editId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
            Object.assign(task, body);
        }
        closeModal(); renderTasks(); updateSummary();
    } else {
        const res = await fetch('/api/tarefas', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        const newTask = { id: data.id, ...body, _running: false, funcionario: '' };
        tasks.unshift(newTask);
        closeModal(); renderTasks(); updateSummary();
        startTimer(data.id);
    }
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        const active = btn.dataset.filter === f;
        btn.classList.toggle('bg-faiston-dark', active); btn.classList.toggle('text-white', active);
        btn.classList.toggle('bg-white', !active); btn.classList.toggle('text-slate-600', !active);
    });
    renderTasks();
}

function renderTasks() {
    const container = document.getElementById('tasks-container');
    const empty = document.getElementById('empty-state');
    const fc = document.getElementById('filter-cliente').value;
    const fp = document.getElementById('filter-prioridade').value;
    let filtered = tasks.filter(t => {
        if (currentFilter !== 'todos' && t.status !== currentFilter) return false;
        if (fc && t.cliente !== fc) return false;
        if (fp && t.prioridade !== fp) return false;
        return true;
    });
    if (!filtered.length) { container.innerHTML = ''; empty.classList.remove('hidden'); empty.classList.add('flex'); return; }
    empty.classList.add('hidden'); empty.classList.remove('flex');
    container.innerHTML = filtered.map(task => {
        const pc = priorityConfig[task.prioridade] || priorityConfig['Media'];
        const sc = statusConfig[task.status] || statusConfig['aberto'];
        const cc = clientColors[task.cliente] || 'bg-slate-100 text-slate-600 border-slate-200';
        const isRunning = task._running;
        const isDone = task.status === 'concluido';
        const secs = isRunning ? task.segundos + Math.floor((Date.now() - timerStart)/1000) : task.segundos;
        const hora = new Date(task.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        return `
        <div class="task-card bg-white rounded-xl border border-faiston-border priority-${task.prioridade} ${isRunning ? 'timer-running' : ''} ${isDone ? 'opacity-60' : ''}">
            <div class="p-4">
                <div class="flex items-start justify-between gap-3">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-2 flex-wrap">
                            <span class="text-[11px] font-semibold px-2 py-0.5 rounded-md border ${sc.badge}">${sc.label}</span>
                            <span class="text-[11px] font-semibold px-2 py-0.5 rounded-md border ${pc.badge} flex items-center gap-1"><i class="ph ${pc.icon} text-xs"></i>${task.prioridade}</span>
                            <span class="text-[11px] font-semibold px-2 py-0.5 rounded-md border ${cc}">${task.cliente}</span>
                            <span class="text-[10px] text-slate-400 ml-auto">${hora}</span>
                        </div>
                        <p class="text-sm font-semibold text-faiston-dark ${isDone ? 'line-through' : ''} leading-snug">${task.descricao}</p>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="editTask(${task.id})" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-700 transition-colors"><i class="ph ph-pencil-simple text-base"></i></button>
                        <button onclick="deleteTask(${task.id})" class="w-8 h-8 rounded-lg hover:bg-red-50 flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-trash text-base"></i></button>
                    </div>
                </div>
                <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-100">
                    <div class="flex items-center gap-2">
                        <i class="ph ph-clock text-slate-400 text-base"></i>
                        <span id="timer-${task.id}" class="timer-display text-base font-bold ${isRunning ? 'text-faiston-cyan' : 'text-slate-600'}">${fmt(secs)}</span>
                        ${isRunning ? '<span class="text-[10px] text-faiston-cyan font-semibold animate-pulse">● RODANDO</span>' : ''}
                    </div>
                    ${!isDone ? `
                    <button onclick="toggleTimer(${task.id})" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${isRunning ? 'bg-red-50 text-red-600 border border-red-200 hover:bg-red-100' : 'bg-gradient-to-r from-faiston-purple to-faiston-cyan text-white shadow-[0_0_10px_rgba(74,0,224,0.3)]'}">
                        <i class="ph ${isRunning ? 'ph-stop-circle' : 'ph-play-circle'} text-base"></i>${isRunning ? 'Pausar' : 'Iniciar'}
                    </button>` : '<span class="text-xs text-emerald-600 font-semibold flex items-center gap-1"><i class="ph ph-check-circle"></i> Concluída</span>'}
                </div>
            </div>
        </div>`;
    }).join('');
    updateSummary();
}

function updateSummary() {
    document.getElementById('count-total').textContent = tasks.length;
    document.getElementById('count-done').textContent = tasks.filter(t => t.status === 'concluido').length;
    document.getElementById('count-progress').textContent = tasks.filter(t => t.status === 'em_andamento').length;
    const total = tasks.reduce((a,t) => a + (t._running ? t.segundos + Math.floor((Date.now()-timerStart)/1000) : t.segundos), 0);
    document.getElementById('count-hours').textContent = fmtH(total);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

init();
</script>
</body>
</html>
